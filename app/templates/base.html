<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wareneingang Modul</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header class="topbar">
    <div class="logo">ERP-Modul Gruppe 04</div>

    <nav>
    <a href="{{ url_for('goods_receipt.goods_receipts') }}">Wareneingang</a>
    <a href="{{ url_for('supplier_invoice.supplier_invoices') }}">Lieferantenrechnung</a>
    <a href="{{ url_for('db_status.db_status') }}">DB-Status</a>
    </nav>
</header>

<main class="content">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="messages">
                {% for category, message in messages %}
                    <div class="message {{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    {% block content %}
    {% endblock %}
</main>

</body>
</html>
